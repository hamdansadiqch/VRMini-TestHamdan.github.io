<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <a-scene>
      
      <a-assets>
        <img id="tex-sun" src="https://corsproxy.io/?https://www.solarsystemscope.com/textures/download/2k_sun.jpg" crossorigin="anonymous">
        <img id="tex-mercury" src="https://corsproxy.io/?https://www.solarsystemscope.com/textures/download/2k_mercury.jpg" crossorigin="anonymous">
        <img id="tex-venus" src="https://corsproxy.io/?https://www.solarsystemscope.com/textures/download/2k_venus_surface.jpg" crossorigin="anonymous">
        <img id="tex-earth" src="https://corsproxy.io/?https://www.solarsystemscope.com/textures/download/2k_earth_daymap.jpg" crossorigin="anonymous">
        <img id="tex-mars" src="https://corsproxy.io/?https://www.solarsystemscope.com/textures/download/2k_mars.jpg" crossorigin="anonymous">
        <img id="tex-jupiter" src="https://corsproxy.io/?https://www.solarsystemscope.com/textures/download/2k_jupiter.jpg" crossorigin="anonymous">
        <img id="tex-space" src="https://corsproxy.io/?https://www.solarsystemscope.com/textures/download/2k_stars.jpg" crossorigin="anonymous">
      </a-assets>

      <a-entity camera look-controls wasd-controls position="0 4 18"></a-entity>
      <a-light type="ambient" color="#333"></a-light>

      <a-sphere id="sun" src="#tex-sun" radius="3" position="0 0 0"
                animation__spin="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear"
                animation__color="property: material.color; type: color; dir: alternate; dur: 3000; loop: true; from: #ffffff; to: #ff4400">
        <a-light type="point" color="#FFF" intensity="2" distance="50"></a-light>
      </a-sphere>

      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">
        <a-sphere src="#tex-mercury" radius="0.2" position="4 0 0"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear">
        </a-sphere>
      </a-entity>

      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear">
        <a-sphere src="#tex-venus" radius="0.4" position="6 0 0"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear">
        </a-sphere>
      </a-entity>

      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 7000; easing: linear">
        <a-sphere src="#tex-earth" radius="0.5" position="8 0 0"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear">
        </a-sphere>
      </a-entity>

      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 9000; easing: linear">
        <a-sphere src="#tex-mars" radius="0.3" position="10 0 0"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear">
        </a-sphere>
      </a-entity>

      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
        <a-sphere src="#tex-jupiter" radius="1.2" position="14 0 0"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear">
        </a-sphere>
      </a-entity>

      <a-sky src="#tex-space"></a-sky>

    </a-scene>
  </body>
</html>
