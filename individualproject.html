<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>VR Dodgeball</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  
  <style>
    body { margin: 0; background-color: #111; color: #fff; font-family: sans-serif; }
    #ui-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #111; }
    .hidden { display: none !important; }
    .panel { text-align: center; border: 2px solid #ff3333; padding: 40px; border-radius: 10px; background: #222; }
    button { background: #ff3333; color: #fff; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.2rem; }
  </style>

  <script>
    let score = 0;
    let lives = 3;
    let level = 1;
    let ballSpeed = 4000; // Takes 4 seconds to hit you in Level 1
    let spawnRate = 2000; // 1 ball every 2 seconds
    let gameLoop;

    function spawnBall() {
      // The 5 starting positions (The Launchers)
      let spawnerPositions = [
        "-8 1.6 -10", "-4 1.6 -10", "0 1.6 -10", "4 1.6 -10", "8 1.6 -10"
      ];
      // Pick a random launcher
      let startPos = spawnerPositions[Math.floor(Math.random() * 5)];

      // Create the dodgeball
      let ball = document.createElement('a-sphere');
      ball.setAttribute('radius', '0.5');
      ball.setAttribute('src', '#ball-tex');
      ball.setAttribute('class', 'clickable'); // Makes it gaze-interactable
      ball.setAttribute('position', startPos);

      // Animate the ball flying directly at the player's head (0, 1.6, 0)
      ball.setAttribute('animation', `property: position; to: 0 1.6 0; dur: ${ballSpeed}; easing: linear;`);

      // EVENT 1: Player successfully looks at the ball to "Block" it
      ball.addEventListener('click', function() {
        document.querySelector('#sfx-block').components.sound.playSound();
        score += 10;
        document.querySelector('#score-text').setAttribute('value', 'Score: ' + score);
        
        // Remove the ball from the scene
        ball.parentNode.removeChild(ball);
        
        checkLevelProgression();
      });

      // EVENT 2: The animation finishes (meaning it reached the player's face without being blocked)
      ball.addEventListener('animationcomplete', function() {
        if (ball.parentNode) { // Check if it still exists (wasn't blocked)
          document.querySelector('#sfx-hit').components.sound.playSound();
          lives -= 1;
          document.querySelector('#lives-text').setAttribute('value', 'Lives: ' + lives);
          
          ball.parentNode.removeChild(ball);

          if (lives <= 0) {
            document.querySelector('#level-text').setAttribute('value', 'GAME OVER');
            document.querySelector('#level-text').setAttribute('color', 'red');
            clearInterval(gameLoop); // Stop spawning balls
          }
        }
      });

      // Add the ball to the VR scene
      document.querySelector('a-scene').appendChild(ball);
    }

    function checkLevelProgression() {
      // Trigger Level 2 at 50 points
      if (score === 50 && level === 1) {
        level = 2;
        document.querySelector('#level-text').setAttribute('value', 'Level: 2');
        
        // Level 2 Mechanics: Faster balls, more frequent spawns
        ballSpeed = 2500; 
        spawnRate = 1200; 
        
        // Restart the game loop with the new harder settings
        clearInterval(gameLoop);
        gameLoop = setInterval(spawnBall, spawnRate);
      }
    }

    // UI Buttons
    function goToSetup() {
      document.getElementById('flashscreen').classList.add('hidden');
      document.getElementById('setup').classList.remove('hidden');
    }

    function startGame() {
      document.getElementById('ui-container').classList.add('hidden');
      if (!document.getElementById('mute').checked) {
        document.querySelector('#bgm').components.sound.playSound();
      }
      // Start throwing balls
      gameLoop = setInterval(spawnBall, spawnRate);
    }
  </script>
</head>
<body>

  <div id="ui-container">
    <div id="flashscreen" class="panel">
      <h1>VR DODGEBALL</h1>
      <p>Developer: <strong>[Your Name]</strong></p>
      <p>Course Info / Student ID</p>
      <button onclick="goToSetup()">Next</button>
    </div>

    <div id="setup" class="panel hidden">
      <h2>Game Setup</h2>
      <label style="font-size: 1.2rem;"><input type="checkbox" id="mute"> Mute Background Music</label><br>
      <p><em>Look directly at the balls to block them!</em></p>
      <button onclick="startGame()">Start Game</button>
    </div>
  </div>

  <a-scene>
    <a-assets>
      <img id="floor-tex" src="assets/floor-texture.jpg">
      <img id="launcher-tex" src="assets/launcher-texture.jpg">
      <img id="ball-tex" src="assets/ball-texture.jpg">
      <img id="wall-tex" src="assets/wall-texture.jpg">
      <img id="ceiling-tex" src="assets/ceiling-texture.jpg">
      
      <audio id="music" src="assets/music.mp3"></audio>
      <audio id="block" src="assets/block.mp3"></audio>
      <audio id="hit" src="assets/hit.mp3"></audio>
    </a-assets>

    <a-entity id="bgm" sound="src: #music; loop: true; volume: 0.4"></a-entity>
    <a-entity id="sfx-block" sound="src: #block; volume: 1"></a-entity>
    <a-entity id="sfx-hit" sound="src: #hit; volume: 1"></a-entity>

    <a-entity position="0 1.6 0">
      <a-camera look-controls="pointerLockEnabled: false" wasd-controls="enabled: false">
        
        <a-text id="score-text" value="Score: 0" position="-1.5 1.2 -2" color="#fff" width="4"></a-text>
        <a-text id="level-text" value="Level: 1" position="0 1.2 -2" color="#ffff00" align="center" width="4"></a-text>
        <a-text id="lives-text" value="Lives: 3" position="1.5 1.2 -2" color="#ff0000" align="right" width="4"></a-text>

        <a-entity cursor="fuse: true; fuseTimeout: 300"
                  raycaster="objects: .clickable"
                  position="0 0 -1"
                  geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.04"
                  material="color: #00ffcc; shader: flat"
                  animation__fusing="property: scale; startEvents: fusing; dur: 300; from: 1 1 1; to: 0.1 0.1 0.1"
                  animation__mouseleave="property: scale; startEvents: mouseleave; dur: 100; to: 1 1 1">
        </a-entity>
      </a-camera>
    </a-entity>

    <a-box src="#launcher-tex" position="-8 0.5 -10" height="3" width="1" depth="1"></a-box>
    <a-box src="#launcher-tex" position="-4 0.5 -10" height="3" width="1" depth="1"></a-box>
    <a-box src="#launcher-tex" position="0 0.5 -10" height="3" width="1" depth="1"></a-box>
    <a-box src="#launcher-tex" position="4 0.5 -10" height="3" width="1" depth="1"></a-box>
    <a-box src="#launcher-tex" position="8 0.5 -10" height="3" width="1" depth="1"></a-box>

    <a-plane src="#floor-tex" rotation="-90 0 0" width="30" height="30" repeat="10 10"></a-plane>
    
    <a-plane src="#wall-tex" position="0 5 -15" width="30" height="10" repeat="8 3"></a-plane>
    <a-plane src="#wall-tex" position="0 5 15" width="30" height="10" rotation="0 180 0" repeat="8 3"></a-plane>
    <a-plane src="#wall-tex" position="-15 5 0" width="30" height="10" rotation="0 90 0" repeat="8 3"></a-plane>
    <a-plane src="#wall-tex" position="15 5 0" width="30" height="10" rotation="0 -90 0" repeat="8 3"></a-plane>

    <a-plane src="#ceiling-tex" position="0 10 0" rotation="90 0 0" width="30" height="30" repeat="10 10"></a-plane>

    <a-sky color="#000"></a-sky>

  </a-scene>
</body>
</html>
