<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Apex Focus - Core Engine</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <script>
      // The Brain of the Game: Handles movement, scoring, levels, and collisions
      AFRAME.registerComponent('game-manager', {
        schema: { maxSpeed: { default: 0.4 } },
        
        init: function () {
          this.score = 0;
          this.level = 1;
          this.speed = 0;
          this.isFocused = false;
          this.isCrashed = false;
          
          // Grab our UI and Audio elements
          this.scoreboard = document.querySelector('#scoreboard');
          this.crashSound = document.querySelector('#sound-crash');
          this.level2 = document.querySelector('#level-2-environment');
          
          const cursor = document.querySelector('#gaze');

          // Gaze Logic (Look at the line to go)
          cursor.addEventListener('mouseenter', (e) => {
            if (e.detail.intersectedEl.classList.contains('racing-line')) {
              this.isFocused = true;
              cursor.setAttribute('color', '#ffffff');
            }
          });

          cursor.addEventListener('mouseleave', () => {
            this.isFocused = false;
            cursor.setAttribute('color', '#ff0044');
          });
        },
        
        tick: function () {
          if (this.isCrashed) return; // Stop moving if crashed

          // 1. Calculate Speed & Score
          if (this.isFocused) {
            this.speed = Math.min(this.speed + 0.005, this.data.maxSpeed);
            this.score += (this.speed * 10); // Score goes up faster at higher speeds
          } else {
            this.speed = Math.max(this.speed - 0.015, 0); // Brake when looking away
          }

          // 2. Move Forward
          let pos = this.el.getAttribute('position');
          if (this.speed > 0) {
            pos.z -= this.speed;
            this.el.setAttribute('position', pos);
          }

          // 3. Update Scoreboard HUD
          this.scoreboard.setAttribute('value', `Level: ${this.level} \nSpeed: ${Math.round(this.speed * 100)} MPH\nScore: ${Math.round(this.score)}`);

          // 4. Level Progression Logic
          // If score passes 2000, trigger Level 2 (Make obstacles visible)
          if (this.score > 2000 && this.level === 1) {
            this.level = 2;
            this.level2.setAttribute('visible', 'true');
            this.data.maxSpeed = 0.6; // Game gets faster in level 2
          }

          // 5. Collision Detection
          // Check distance between player and all obstacles
          const obstacles = document.querySelectorAll('.obstacle');
          obstacles.forEach(obs => {
            let obsPos = obs.getAttribute('position');
            // Simple 2D distance formula (ignoring height)
            let dx = pos.x - obsPos.x;
            let dz = pos.z - obsPos.z;
            let distance = Math.sqrt(dx * dx + dz * dz);
            
            // If we are within 1.5 units of an obstacle, CRASH!
            if (distance < 1.5 && this.level === 2) {
              this.handleCrash();
            }
          });
        },

        handleCrash: function () {
          this.isCrashed = true;
          this.speed = 0;
          this.score = Math.max(0, this.score - 500); // Penalty
          this.scoreboard.setAttribute('value', 'CRASHED!\n-500 Points');
          this.scoreboard.setAttribute('color', '#ff0000');
          
          // Play crash sound
          this.crashSound.components.sound.playSound();

          // Recover after 2 seconds
          setTimeout(() => {
            this.isCrashed = false;
            this.scoreboard.setAttribute('color', '#00ffcc');
          }, 2000);
        }
      });
    </script>
  </head>
  <body>
    <a-scene background="color: #030714"> 
      
      <a-assets>
        <audio id="bgm" src="bgm.mp3" preload="auto"></audio>
        <audio id="engine" src="engine.mp3" preload="auto"></audio>
        <audio id="crash" src="crash.mp3" preload="auto"></audio>
      </a-assets>

      <a-sound src="#bgm" autoplay="true" loop="true" volume="0.3"></a-sound>

      <a-entity id="rig" position="0 1.6 0" game-manager>
        
        <a-sound src="#engine" autoplay="true" loop="true" volume="0.5"></a-sound>
        <a-entity id="sound-crash" sound="src: #crash; volume: 1"></a-entity>

        <a-camera position="0 0 0" wasd-controls="enabled: false">
          
          <a-text id="scoreboard" 
                  value="Level: 1 \nSpeed: 0 \nScore: 0" 
                  position="-1.5 0.8 -2" 
                  color="#00ffcc" 
                  font="exo2bold" 
                  width="4">
          </a-text>

          <a-entity id="gaze" 
                    cursor="fuse: false; rayOrigin: entity;"
                    raycaster="objects: .racing-line"
                    position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                    material="color: #ff0044; shader: flat; opacity: 0.8">
          </a-entity>
        </a-camera>
      </a-entity>

      <a-entity id="level-1-environment">
        <a-plane class="racing-line" position="0 0.01 -10" rotation="-90 0 0" width="2" height="30" material="color: #00ffcc; shader: flat; opacity: 0.6; transparent: true"></a-plane>
        <a-plane class="racing-line" position="-2 0.01 -38" rotation="-90 20 0" width="2" height="30" material="color: #00ffcc; shader: flat; opacity: 0.6; transparent: true"></a-plane>
        <a-plane class="racing-line" position="-7 0.01 -65" rotation="-90 20 0" width="2" height="30" material="color: #00ffcc; shader: flat; opacity: 0.6; transparent: true"></a-plane>
      </a-entity>

      <a-entity id="level-2-environment" visible="false">
        
        <a-plane class="racing-line" position="-12 0.01 -92" rotation="-90 20 0" width="2" height="30" material="color: #ff00ff; shader: flat; opacity: 0.6; transparent: true"></a-plane>
        <a-plane class="racing-line" position="-17 0.01 -119" rotation="-90 20 0" width="2" height="30" material="color: #ff00ff; shader: flat; opacity: 0.6; transparent: true"></a-plane>

        <a-box class="obstacle" position="-12 1 -85" color="#ff0000" depth="2" height="2" width="2"></a-box>
        <a-box class="obstacle" position="-16 1 -105" color="#ff0000" depth="2" height="2" width="2"></a-box>
        
      </a-entity>

    </a-scene>
  </body>
</html>
